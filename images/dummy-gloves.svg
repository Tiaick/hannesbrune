    <stop offset="0%" stop-color="#D41B1B" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0F0F0F" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#g4)"/>
  <!-- Left glove (simplified) -->
  <g transform="translate(60,100) rotate(-20,80,120)">
    <rect x="30" y="80" width="100" height="80" rx="20" fill="none" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.6"/>
    <rect x="20" y="100" width="115" height="55" rx="25" fill="none" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.6"/>
    <rect x="45" y="155" width="70" height="40" rx="10" fill="none" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="20" y1="125" x2="135" y2="125" stroke="#D41B1B" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <!-- Right glove (mirrored) -->
  <g transform="translate(340,100) scale(-1,1) rotate(-20,80,120)">
    <rect x="30" y="80" width="100" height="80" rx="20" fill="none" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.6"/>
    <rect x="20" y="100" width="115" height="55" rx="25" fill="none" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.6"/>
    <rect x="45" y="155" width="70" height="40" rx="10" fill="none" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="20" y1="125" x2="135" y2="125" stroke="#D41B1B" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <!-- Center X -->
  <text x="200" y="310" text-anchor="middle" font-family="serif" font-size="13" fill="#D41B1B" fill-opacity="0.5" letter-spacing="8">KAMPF</text>
</svg>
