<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#0A0A0A"/>
  <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7A0000" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
  </linearGradient>
  <rect width="400" height="500" fill="url(#g5)"/>
  <!-- Running figure silhouette (abstract) -->
  <circle cx="200" cy="100" r="35" fill="none" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Body -->
  <line x1="200" y1="135" x2="200" y2="260" stroke="#D41B1B" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Arms running position -->
  <line x1="200" y1="165" x2="150" y2="210" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="200" y1="165" x2="255" y2="140" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Legs running position -->
  <line x1="200" y1="260" x2="160" y2="340" stroke="#D41B1B" stroke-width="2.5" stroke-opacity="0.6"/>
  <line x1="200" y1="260" x2="245" y2="330" stroke="#D41B1B" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Feet -->
  <line x1="160" y1="340" x2="130" y2="360" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="245" y1="330" x2="280" y2="345" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Motion lines -->
  <line x1="60" y1="200" x2="130" y2="200" stroke="#D41B1B" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="40" y1="220" x2="110" y2="220" stroke="#D41B1B" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="200" y="450" text-anchor="middle" font-family="serif" font-size="13" fill="#D41B1B" fill-opacity="0.5" letter-spacing="8">ROADWORK</text>
</svg>
