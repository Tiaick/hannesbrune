<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#0D0D0D"/>
  <radialGradient id="g1" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#D41B1B" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="500" fill="url(#g1)"/>
  <!-- Chain -->
  <line x1="200" y1="0" x2="200" y2="80" stroke="#D41B1B" stroke-width="3" stroke-dasharray="8 6" stroke-opacity="0.6"/>
  <circle cx="200" cy="85" r="10" fill="none" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Bag body -->
  <rect x="130" y="95" width="140" height="260" rx="70" fill="none" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Band stripes -->
  <line x1="130" y1="185" x2="270" y2="185" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="130" y1="225" x2="270" y2="225" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="130" y1="265" x2="270" y2="265" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Bottom weight -->
  <ellipse cx="200" cy="355" rx="50" ry="12" fill="none" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Label -->
  <text x="200" y="455" text-anchor="middle" font-family="serif" font-size="14" fill="#D41B1B" fill-opacity="0.5" letter-spacing="8" font-weight="300">TRAINING</text>
  <line x1="80" y1="465" x2="145" y2="465" stroke="#D41B1B" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="255" y1="465" x2="320" y2="465" stroke="#D41B1B" stroke-opacity="0.3" stroke-width="1"/>
</svg>
