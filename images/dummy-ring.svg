<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <rect width="500" height="400" fill="#0A0A0A"/>
  <radialGradient id="g2" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#7A0000" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
  </radialGradient>
  <rect width="500" height="400" fill="url(#g2)"/>
  <!-- Ring floor -->
  <ellipse cx="250" cy="230" rx="200" ry="80" fill="none" stroke="#D41B1B" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Corner posts -->
  <circle cx="90" cy="120" r="8" fill="none" stroke="#D41B1B" stroke-width="2.5" stroke-opacity="0.7"/>
  <circle cx="410" cy="120" r="8" fill="none" stroke="#D41B1B" stroke-width="2.5" stroke-opacity="0.7"/>
  <circle cx="90" cy="290" r="8" fill="none" stroke="#D41B1B" stroke-width="2.5" stroke-opacity="0.7"/>
  <circle cx="410" cy="290" r="8" fill="none" stroke="#D41B1B" stroke-width="2.5" stroke-opacity="0.7"/>
  <!-- Ropes top to bottom -->
  <line x1="90" y1="120" x2="410" y2="120" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="90" y1="160" x2="410" y2="160" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="90" y1="200" x2="410" y2="200" stroke="#D41B1B" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="90" y1="290" x2="410" y2="290" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Ropes sides -->
  <line x1="90" y1="120" x2="90" y2="290" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="410" y1="120" x2="410" y2="290" stroke="#D41B1B" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Center cross -->
  <line x1="250" y1="120" x2="250" y2="290" stroke="#D41B1B" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="6 4"/>
  <line x1="90" y1="205" x2="410" y2="205" stroke="#D41B1B" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="6 4"/>
  <!-- Label -->
  <text x="250" y="360" text-anchor="middle" font-family="serif" font-size="13" fill="#D41B1B" fill-opacity="0.5" letter-spacing="10">DER RING</text>
</svg>
